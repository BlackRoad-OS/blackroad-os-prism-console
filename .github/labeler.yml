# Auto-labeling configuration for PRs based on changed files
# Frontend-focused labels for React/Next.js application

# Component changes
component:
  - changed-files:
    - any-glob-to-any-file: 'src/components/**/*.{ts,tsx}'

# Page/Route changes
pages:
  - changed-files:
    - any-glob-to-any-file: 'src/app/**/*.{ts,tsx}'

# API routes
api:
  - changed-files:
    - any-glob-to-any-file: 'src/app/api/**/*.ts'

# Styling changes
styles:
  - changed-files:
    - any-glob-to-any-file: '**/*.css'
    - any-glob-to-any-file: '**/*.scss'
    - any-glob-to-any-file: 'src/app/globals.css'

# Configuration changes
config:
  - changed-files:
    - any-glob-to-any-file:
      - 'next.config.mjs'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.prettierrc*'
      - 'src/config/**/*.ts'

# Testing changes
testing:
  - changed-files:
    - any-glob-to-any-file:
      - 'tests/**/*'
      - '**/*.test.{ts,tsx}'
      - '**/*.spec.{ts,tsx}'
      - 'jest.config.js'
      - 'jest.setup.js'

# Documentation changes
documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**/*'

# CI/CD changes
ci/cd:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/**/*.yml'
      - '.github/workflows/**/*.yaml'
      - 'Dockerfile'
      - 'railway.json'
      - 'railway.toml'
      - 'nixpacks.toml'

# Dependency changes
dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'package.json'
      - 'package-lock.json'

# Infrastructure/deployment
infra:
  - changed-files:
    - any-glob-to-any-file:
      - 'infra/**/*'
      - 'Dockerfile'
      - 'docker-compose.yml'

# Lib/utilities
lib:
  - changed-files:
    - any-glob-to-any-file: 'src/lib/**/*.ts'

# TypeScript types
types:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.d.ts'
      - 'src/types/**/*.ts'
