name: Bug Report
description: Report a bug in the Prism Console
title: "[BUG] "
labels: ["type:bug", "team:prism", "status:ready"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report Template
        Use this template to report bugs in the Prism Console.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How critical is this bug?
      options:
        - prio:P0
        - prio:P1
        - prio:P2
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: What is the impact of this bug?
      options:
        - Critical - Console unusable
        - High - Major feature broken
        - Medium - Feature partially broken
        - Low - Minor issue or cosmetic
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug
      placeholder: "The Prism Console crashes when loading the agents page..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Navigate to /agents
        2. Click on 'atlas' agent
        3. Console crashes
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: "The agent inspector should open..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
      placeholder: "Console crashes with error..."
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Where does this occur? (Railway, local, Cloudflare, etc.)
      placeholder: "Railway production"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant error logs or console output
      placeholder: "Error: Cannot read property..."
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: "Screenshots, browser version, etc..."
    validations:
      required: false
